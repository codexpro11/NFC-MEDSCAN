# ── Production Profile ──────────────────────────────────────
# Activated via SPRING_PROFILES_ACTIVE=prod (set in Render env vars)

# Disable verbose SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.yolo.nfc=INFO

# Disable Swagger UI in production
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}

# Use validate in production — schema changes should be done via migration scripts
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}

# Ensure Swagger UI uses the correct domain and HTTPS on Railway
server.forward-headers-strategy=framework
springdoc.swagger-ui.configUrl=/v3/api-docs/swagger-config
