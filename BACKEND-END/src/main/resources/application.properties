spring.application.name=NFC
# Server Configuration
server.port=8080

# Database Configuration — override via env vars in Docker/prod
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/nfc_health_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT — override JWT_SECRET env var in production (min 64 chars)
jwt.secret=${JWT_SECRET:dev-only-secret-key-replace-in-prod-must-be-at-least-64-characters-long!!}

# Google Sign-In — set GOOGLE_CLIENT_ID env var in production
# FIX: Added :NOT_SET default — without this Spring Boot crashes on startup if the
# env var is missing, breaking ALL sign-ins (not just Google).
google.client-id=${GOOGLE_CLIENT_ID:NOT_SET}

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false

# FIX: Enable RFC 7807 Problem Details for ALL Spring MVC built-in exceptions.
# Without this, Spring Boot 3's DefaultHandlerExceptionResolver intercepts exceptions
# like HttpMessageNotReadableException and MethodArgumentNotValidException BEFORE
# GlobalExceptionHandler runs, returning an empty body with content-length: 0.
# This one line ensures every error has a JSON body.
spring.mvc.problemdetails.enabled=true

# Springdoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Actuator — expose health endpoint for Docker healthcheck
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# CORS — override via CORS_ALLOWED_ORIGINS env var in production (comma-separated)
# Default allows local development origins; in prod set to your Vercel URLs
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173,http://localhost:5174,http://localhost:3000,http://localhost:3001,https://nfc-medscan.vercel.app,https://nfc-medscan-eight.vercel.app}

# Logging
logging.level.org.yolo.nfc=DEBUG
logging.level.org.hibernate.SQL=DEBUG
